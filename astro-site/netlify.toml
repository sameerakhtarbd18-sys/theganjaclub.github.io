[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/uk.html"
  to = "/uk"
  status = 301

[[redirects]]
  from = "/europe.html"
  to = "/europe"
  status = 301

[[redirects]]
  from = "/usa.html"
  to = "/usa"
  status = 301

[[redirects]]
  from = "/global.html"
  to = "/global"
  status = 301

[[redirects]]
  from = "/post.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/grow-assistant.html"
  to = "/grow-assistant"
  status = 301

[[redirects]]
  from = "/rss.xml"
  to = "/rss.xml"
  status = 200

[functions]
  directory = "netlify/functions"
