<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00754A"/>
      <stop offset="100%" stop-color="#006241"/>
    </linearGradient>
  </defs>

  <!-- Cannabis Leaf -->
  <g transform="translate(58, 32) scale(0.7)">
    <!-- Stem -->
    <path d="M40 75 L38 95 Q37 100 40 103" stroke="url(#leafGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Center vein -->
    <path d="M40 10 L40 75" stroke="url(#leafGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left leaflets -->
    <path d="M40 18 Q20 10 4 8 Q2 14 6 18 Q14 18 20 20 Q26 22 32 26 Q36 22 38 18 Z" fill="url(#leafGrad)" opacity="0.9"/>
    <path d="M40 32 Q18 28 2 32 Q1 38 6 42 Q16 40 24 38 Q30 36 35 36 Q37 40 38 42 Q40 38 40 32 Z" fill="url(#leafGrad)" opacity="0.85"/>
    <path d="M40 48 Q22 48 8 56 Q6 62 12 66 Q22 62 30 58 Q34 54 38 52 Q40 54 40 58 Q42 52 40 48 Z" fill="url(#leafGrad)" opacity="0.8"/>

    <!-- Right leaflets -->
    <path d="M40 18 Q60 10 76 8 Q78 14 74 18 Q66 18 60 20 Q54 22 48 26 Q44 22 42 18 Z" fill="url(#leafGrad)" opacity="0.9"/>
    <path d="M40 32 Q62 28 78 32 Q79 38 74 42 Q64 40 56 38 Q50 36 45 36 Q43 40 42 42 Q40 38 40 32 Z" fill="url(#leafGrad)" opacity="0.85"/>
    <path d="M40 48 Q58 48 72 56 Q74 62 68 66 Q58 62 50 58 Q46 54 42 52 Q40 54 40 58 Q38 52 40 48 Z" fill="url(#leafGrad)" opacity="0.8"/>

    <!-- Center leaflet -->
    <path d="M38 16 Q38 0 40 -4 Q42 0 42 16 Z" fill="url(#leafGrad)" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="130" y="58" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="700" font-size="32" fill="#1e1e1e" letter-spacing="-0.5">THE GANJA</text>
  <text x="130" y="86" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#006241" letter-spacing="8">CLUB</text>

  <!-- Subtitle line -->
  <line x1="130" y1="96" x2="320" y2="96" stroke="#00754A" stroke-width="1" opacity="0.4"/>
</svg>
