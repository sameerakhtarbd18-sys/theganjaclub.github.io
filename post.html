<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ganja Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf9;--text:#1c1c1c;--text2:#5a5a5a;--accent:#b8860b;--line:#e5e2dd;--sans:'Inter',sans-serif;--serif:'PT Serif',Georgia,serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.8;font-weight:400}
.wrap{max-width:660px;margin:0 auto;padding:0 20px}
a{color:var(--accent);text-decoration:none}
a:hover{opacity:.7}
.head{padding:24px 0;border-bottom:2px solid var(--text);margin-bottom:32px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--text);letter-spacing:-.03em}
.logo em{font-style:normal;color:var(--accent)}
.back{color:var(--text2);font-size:.78rem}
.back:hover{color:var(--text)}
article h1{font-family:var(--serif);font-size:2rem;line-height:1.25;margin-bottom:10px;font-weight:700}
.meta{color:var(--text2);font-size:.78rem;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--line)}
article p{margin-bottom:16px;font-size:1rem}
article h2{font-family:var(--serif);font-size:1.3rem;margin:28px 0 12px;font-weight:700}
article h3{font-size:1rem;margin:20px 0 10px;font-weight:600}
article blockquote{border-left:2px solid var(--accent);padding-left:16px;margin:20px 0;color:var(--text2);font-style:italic}
article ul,article ol{margin:12px 0;padding-left:20px}
article li{margin-bottom:6px}
.loading{text-align:center;padding:80px 0;color:var(--text2)}
.ft{padding:32px 0;border-top:2px solid var(--line);margin-top:40px;text-align:center;font-size:.75rem;color:#bbb}
.ft a{color:#999}
.ft a:hover{color:var(--text)}
@media(max-width:600px){article h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="wrap">
<div class="head">
<a href="/theganjaclub.github.io/" class="logo">The Ganja <em>Club</em></a>
<a href="/theganjaclub.github.io/" class="back">← Back</a>
</div>
<div id="loader" class="loading">Loading post…</div>
<article id="post-full" style="display:none">
<h1 id="p-title"></h1>
<div class="meta" id="p-meta"></div>
<div id="p-body"></div>
</article>
<div class="ft">© 2026 The Ganja Club</div>
</div>
<script>
var BASE = window.location.pathname.replace(/\/[^\/]*$/,'');
if (!BASE) BASE = '/theganjaclub.github.io';
var pid = new URLSearchParams(window.location.search).get('id');
fetch(BASE + '/posts.json').then(function(r){return r.json()}).then(function(posts){
var post = posts.find(function(p){return p.id === pid;}) || posts[0];
if(!post) return;
document.title = post.title + ' — The Ganja Club';
document.getElementById('p-title').textContent = post.title;
document.getElementById('p-meta').textContent = post.date + ' · ' + post.readTime + ' min read · ' + post.tags;
document.getElementById('p-body').innerHTML = post.body;
document.getElementById('loader').style.display = 'none';
document.getElementById('post-full').style.display = 'block';
});
</script>
</body>
</html>
