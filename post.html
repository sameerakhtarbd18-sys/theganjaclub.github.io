<title>The Ganja Club</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--text:#111827;--dim:#6b7280;--green:#059669;--green-dark:#047857;--line:#e5e7eb;--sans:'Inter',sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.8}
.wrap{max-width:660px;margin:0 auto;padding:0 20px}
a{color:var(--green);text-decoration:none}
a:hover{opacity:.8}
.hd{padding:24px 0;border-bottom:2px solid var(--text);margin-bottom:32px;display:flex;justify-content:space-between;align-items:center}
.lg{font-size:1.1rem;font-weight:700;letter-spacing:-.03em}
.lg span{color:var(--green)}
.bk{color:var(--dim);font-size:.78rem}
.bk:hover{color:var(--green)}
article h1{font-size:2rem;line-height:1.25;margin-bottom:10px;font-weight:700}
.mt{color:var(--dim);font-size:.78rem;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--line)}
article p{margin-bottom:16px;font-size:1rem}
article h2{font-size:1.3rem;margin:28px 0 12px;font-weight:700}
article h3{font-size:1rem;margin:20px 0 10px;font-weight:600}
article blockquote{border-left:2px solid var(--green);padding-left:16px;margin:20px 0;color:var(--dim);font-style:italic}
article ul,article ol{margin:12px 0;padding-left:20px}
article li{margin-bottom:6px}
#img-here{width:100%;height:240px;margin-bottom:24px;overflow:hidden;background:#e5e7eb}
#img-here img{width:100%;height:100%;object-fit:cover}
.ld{text-align:center;padding:80px 0;color:var(--dim)}
.ft{padding:32px 0;border-top:2px solid var(--line);margin-top:40px;text-align:center;font-size:.75rem;color:#9ca3af}
.ft a{color:#9ca3af}
.ft a:hover{color:var(--green)}
@media(max-width:600px){article h1{font-size:1.4rem}#img-here{height:180px}}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
<a href="/" class="lg">The Ganja <span>Club</span></a>
<a href="/" class="bk">← Back</a>
</div>
<div id="loader" class="ld">Loading post...</div>
<article id="pf" style="display:none">
<div id="img-here"></div>
<h1 id="ptit"></h1>
<div class="mt" id="pmet"></div>
<div id="pbd"></div>
</article>
<div class="ft">&copy; 2026 The Ganja Club</div>
</div>
<script>

var pid = window.location.search.split('=')[1] || '';
var x = new XMLHttpRequest();
x.open('GET', 'posts.json', true);
x.onload = function() {
  try {
    var posts = JSON.parse(x.responseText);
    var post = null;
    for (var i = 0; i < posts.length; i++) {
      if (posts[i].id === pid) { post = posts[i]; break; }
    }
    if (!post) post = posts[0];
    if (!post) return;
    document.title = post.title + ' - The Ganja Club';
    var imgs = POST_IMGS[post.id] || POST_IMGS[Object.keys(POST_IMGS)[0]];
    document.getElementById('img-here').innerHTML = '<img src="' + imgs.hero + '" alt="' + post.title + '" loading="lazy">';
    document.getElementById('ptit').textContent = post.title;
    document.getElementById('pmet').textContent = post.date + ' - ' + post.readTime + ' min read - ' + post.tags;
    document.getElementById('pbd').innerHTML = post.body;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('pf').style.display = 'block';
  } catch(e) {}
};
x.send();
</script>
