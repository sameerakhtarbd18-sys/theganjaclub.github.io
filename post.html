<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ganja Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0b;--card:#111113;--text:#e4e0d8;--muted:#7a7770;--gold:#be9b3c;--line:#1e1e20;--sans:'Inter',sans-serif;--serif:'Libre Baskerville',Georgia,serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.8;font-weight:300;-webkit-font-smoothing:antialiased}
.wrap{max-width:660px;margin:0 auto;padding:0 24px}
a{color:var(--gold);text-decoration:none}
a:hover{opacity:.8}
.head{padding:28px 0;border-bottom:1px solid var(--line);margin-bottom:36px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:var(--text);letter-spacing:-0.03em}
.logo em{font-style:normal;color:var(--gold)}
.back{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em}
.back:hover{color:var(--gold)}
article h1{font-family:var(--serif);font-size:2rem;line-height:1.25;margin-bottom:10px;font-weight:400}
.meta{color:var(--muted);font-size:.78rem;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.06em}
article p{margin-bottom:18px;font-size:1rem;color:var(--text)}
article h2{font-family:var(--serif);font-size:1.3rem;margin:32px 0 14px;color:var(--text);font-weight:400}
article h3{font-size:1rem;margin:24px 0 10px;font-weight:500}
article blockquote{border-left:2px solid var(--gold);padding-left:18px;margin:22px 0;color:var(--muted);font-style:italic}
article ul,article ol{margin:14px 0;padding-left:22px}
article li{margin-bottom:6px;color:var(--text)}
.loading{text-align:center;padding:80px 0;color:var(--muted)}
.ft{padding:36px 0;border-top:1px solid var(--line);margin-top:48px;text-align:center;font-size:.75rem;color:#444}
.ft a{color:#555}
.ft a:hover{color:var(--gold)}
@media(max-width:600px){article h1{font-size:1.5rem}.wrap{padding:0 16px}}
</style>
</head>
<body>
<div class="wrap">
<div class="head">
<a href="/theganjaclub.github.io/" class="logo">The Ganja <em>Club</em></a>
<a href="/theganjaclub.github.io/" class="back">← Back</a>
</div>
<div id="loader" class="loading">Loading post…</div>
<article id="post-full" style="display:none">
<h1 id="p-title"></h1>
<div class="meta" id="p-meta"></div>
<div id="p-body"></div>
</article>
<div class="ft">© 2026 The Ganja Club</div>
</div>
<script>
var BASE = window.location.pathname.replace(/\/[^\/]*$/,'');
if (!BASE) BASE = '/theganjaclub.github.io';

var params = new URLSearchParams(window.location.search);
var pid = params.get('id');
var x = new XMLHttpRequest();
x.open('GET', BASE + '/posts.json', true);
x.onload = function(){
if(x.status !== 200) return;
try{
var posts = JSON.parse(x.responseText);
var post = posts.find(function(p){return p.id === pid;}) || posts[0];
if(!post) return;
document.title = post.title + ' — The Ganja Club';
document.getElementById('p-title').textContent = post.title;
document.getElementById('p-meta').textContent = post.date + ' · ' + post.readTime + ' min read · ' + post.tags;
document.getElementById('p-body').innerHTML = post.body;
document.getElementById('loader').style.display = 'none';
document.getElementById('post-full').style.display = 'block';
}catch(e){}
};
x.send();
</script>
</body>
</html>
