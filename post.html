<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ganja Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf9;--text:#1a1a1a;--dim:#666;--gold:#b8860b;--line:#e8e4dd;--sans:'Inter',sans-serif;--serif:'PT Serif',Georgia,serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.8}
.wrap{max-width:660px;margin:0 auto;padding:0 20px}
a{color:var(--gold);text-decoration:none}
a:hover{opacity:.7}
.hd{padding:24px 0;border-bottom:2px solid var(--text);margin-bottom:32px;display:flex;justify-content:space-between;align-items:center}
.lg{font-family:var(--serif);font-size:1.1rem;font-weight:700;letter-spacing:-.03em}
.lg span{color:var(--gold)}
.bk{color:var(--dim);font-size:.78rem}
.bk:hover{color:var(--text)}
article h1{font-family:var(--serif);font-size:2rem;line-height:1.25;margin-bottom:10px;font-weight:700}
.mt{color:var(--dim);font-size:.78rem;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--line)}
article p{margin-bottom:16px;font-size:1rem}
article h2{font-family:var(--serif);font-size:1.3rem;margin:28px 0 12px;font-weight:700}
article h3{font-size:1rem;margin:20px 0 10px;font-weight:600}
article blockquote{border-left:2px solid var(--gold);padding-left:16px;margin:20px 0;color:var(--dim);font-style:italic}
article ul,article ol{margin:12px 0;padding-left:20px}
article li{margin-bottom:6px}
#img-here{width:100%;height:240px;background:#ddd;margin-bottom:24px;overflow:hidden}
#img-here img{width:100%;height:100%;object-fit:cover}
.ld{text-align:center;padding:80px 0;color:var(--dim)}
.ft{padding:32px 0;border-top:2px solid var(--line);margin-top:40px;text-align:center;font-size:.75rem;color:#bbb}
.ft a{color:#999}
.ft a:hover{color:var(--text)}
@media(max-width:600px){article h1{font-size:1.4rem}#img-here{height:180px}}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
<a href="/theganjaclub.github.io/" class="lg">The Ganja <span>Club</span></a>
<a href="/theganjaclub.github.io/" class="bk">Back</a>
</div>
<div id="loader" class="ld">Loading post...</div>
<article id="pf" style="display:none">
<div id="img-here"></div>
<h1 id="ptit"></h1>
<div class="mt" id="pmet"></div>
<div id="pbd"></div>
</article>
<div class="ft">&copy; 2026 The Ganja Club</div>
</div>
<script>
var B = '/theganjaclub.github.io';
var IMGS = [
  'https://images.pexels.com/photos/27910870/pexels-photo-27910870.jpeg?w=800',
  'https://images.pexels.com/photos/27910867/pexels-photo-27910867.jpeg?w=800',
  'https://images.pexels.com/photos/27910871/pexels-photo-27910871.jpeg?w=800',
  'https://images.pexels.com/photos/27910872/pexels-photo-27910872.jpeg?w=800',
  'https://images.pexels.com/photos/27910869/pexels-photo-27910869.jpeg?w=800'
];
var pid = window.location.search.split('=')[1] || '';
var x = new XMLHttpRequest();
x.open('GET', B + '/posts.json', true);
x.onload = function() {
  try {
    var posts = JSON.parse(x.responseText);
    var post = null;
    for (var i = 0; i < posts.length; i++) {
      if (posts[i].id === pid) { post = posts[i]; break; }
    }
    if (!post) post = posts[0];
    if (!post) return;
    document.title = post.title + ' - The Ganja Club';
    var idx = Math.floor(Math.random() * IMGS.length);
    document.getElementById('img-here').innerHTML = '<img src="' + IMGS[idx] + '" alt="Cannabis" loading="lazy">';
    document.getElementById('ptit').textContent = post.title;
    document.getElementById('pmet').textContent = post.date + ' - ' + post.readTime + ' min read - ' + post.tags;
    document.getElementById('pbd').innerHTML = post.body;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('pf').style.display = 'block';
  } catch(e) {}
};
x.send();
</script>
</body>
</html>
