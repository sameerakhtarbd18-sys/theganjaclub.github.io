<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ganja Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #c9a84c;
            --border: #1a1a1a;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-serif: 'Playfair Display', Georgia, serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 680px; margin: 0 auto; padding: 0 24px; }
        header {
            padding: 32px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }
        .back { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
        .back:hover { text-decoration: underline; }
        .site-title {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        .site-title span { color: var(--accent); }
        
        article h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        article p {
            margin-bottom: 20px;
            font-size: 1.05rem;
        }
        article h2 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            margin: 36px 0 16px;
        }
        article h3 {
            font-size: 1.15rem;
            margin: 28px 0 12px;
            font-weight: 600;
        }
        article blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin: 24px 0;
            color: var(--text-muted);
            font-style: italic;
        }
        article ul, article ol {
            margin: 16px 0;
            padding-left: 24px;
        }
        article li { margin-bottom: 8px; }
        article a { color: var(--accent); }
        footer {
            margin-top: 64px;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        #post-content { display: none; }
        #loading { color: var(--text-muted); text-align: center; padding: 80px 0; }
        @media (max-width: 600px) {
            article h1 { font-size: 1.6rem; }
            .container { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="site-title">THE GANJA <span>CLUB</span></a>
        </header>
        
        <a href="/" class="back">← Back to all stories</a>
        
        <div id="loading">Loading...</div>
        
        <div id="post-content">
            <article>
                <h1 id="post-title"></h1>
                <div class="meta" id="post-meta"></div>
                <div id="post-body"></div>
            </article>
        </div>
        
        <footer>
            <p>&copy; 2026 The Ganja Club · <a href="https://instagram.com/theganjaclub_" target="_blank">Instagram</a></p>
        </footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');
        
        fetch('/posts.json')
            .then(r => r.json())
            .then(posts => {
                const post = posts.find(p => p.id === postId) || posts[0];
                if (!post) return;
                
                document.title = post.title + ' — The Ganja Club';
                document.getElementById('post-title').textContent = post.title;
                document.getElementById('post-meta').textContent = post.date + ' · ' + post.readTime + ' min read · ' + post.tags;
                document.getElementById('post-body').innerHTML = post.body;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('post-content').style.display = 'block';
            });
    </script>
</body>
</html>
