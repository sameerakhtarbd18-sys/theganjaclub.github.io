<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGION — The Ganja Club</title>
<meta name="description" content="REGION medical cannabis news, policy, and culture from The Ganja Club.">
<meta property="og:title" content="REGION — The Ganja Club">
<meta property="og:description" content="REGION medical cannabis news, policy, and culture.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Ganja Club">
<meta property="og:image" content="https://theganjaclub.netlify.app/images/pexels-kindelmedia-7667912.webp">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@theganjaclub_">
<link rel="alternate" type="application/rss+xml" href="/rss.xml" title="The Ganja Club">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div id="reading-progress"></div>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="nav-brand-icon">🌿</span>The Ganja <span>Club</span></a>
    <button class="nav-mobile-toggle" id="mobile-toggle" aria-label="Menu">☰</button>
    <div class="nav-links" id="nav-links">
      <a href="/">Latest</a>
      <a href="/uk.html" data-nav="uk">UK</a>
      <a href="/europe.html" data-nav="europe">Europe</a>
      <a href="/usa.html" data-nav="usa">USA</a>
      <a href="/global.html" data-nav="global">Global</a>
      <a href="/grow-assistant.html" class="nav-grow-link">🌱 Grow</a>
    </div>
    <div class="nav-actions">
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
    </div>
  </div>
</nav>

<main class="container">
  <div style="padding:var(--space-2xl) 0 var(--space-xl)">
    <h1 class="section-title" style="font-size:var(--text-3xl)" id="page-title">REGION</h1>
    <p style="color:var(--color-text-secondary);margin-top:var(--space-sm)" id="page-desc">Medical cannabis news and policy analysis from REGION.</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search REGION articles…" oninput="doSearch()">
  </div>
  <div class="empty-state" id="no-results" style="display:none">No articles match your search.</div>

  <div class="article-grid" id="post-grid"></div>
  <div class="loading-state" id="loading">Loading articles…</div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 The Ganja Club. Medical cannabis news & culture.</span>
    </div>
  </div>
</footer>

<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>

<script>
/* ── Theme ────────────────────────────────────────────── */
function toggleTheme() {
  var h = document.documentElement;
  var d = h.getAttribute('data-theme') === 'dark';
  h.setAttribute('data-theme', d ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = d ? '🌙' : '☀️';
  localStorage.setItem('theme', d ? 'light' : 'dark');
}
(function() {
  var s = localStorage.getItem('theme');
  if (s === 'dark' || (!s && matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
})();

window.addEventListener('scroll', function() {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 600);
  var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById('reading-progress').style.width = h ? (window.scrollY / h * 100) + '%' : '0%';
});

document.getElementById('mobile-toggle').addEventListener('click', function() {
  document.getElementById('nav-links').classList.toggle('open');
});

/* ── Region config ───────────────────────────────────── */
var path = window.location.pathname;
var regionMap = { '/uk.html': 'UK', '/europe.html': 'Europe', '/usa.html': 'USA', '/global.html': 'Global' };
var REGION = regionMap[path] || 'UK';
var regionDesc = {
  UK: 'Medical cannabis news and policy analysis from the United Kingdom.',
  Europe: 'Medical cannabis developments across the European continent.',
  USA: 'Cannabis policy, industry, and culture from the United States.',
  Global: 'International cannabis news, policy shifts, and global trends.'
};

document.title = REGION + ' — The Ganja Club';
document.getElementById('page-title').textContent = REGION;
document.getElementById('page-desc').textContent = regionDesc[REGION];
document.getElementById('search').placeholder = 'Search ' + REGION + ' articles…';
document.querySelector('meta[name="description"]').setAttribute('content', regionDesc[REGION]);
document.querySelector('meta[property="og:title"]').setAttribute('content', REGION + ' — The Ganja Club');
document.querySelector('meta[property="og:description"]').setAttribute('content', regionDesc[REGION]);

/* Highlight active nav */
document.querySelectorAll('[data-nav]').forEach(function(a) {
  if (a.dataset.nav === REGION.toLowerCase()) a.classList.add('active');
});

/* ── Helpers ─────────────────────────────────────────── */
function getPostImage(post) {
  if (post.image) { if (post.image.startsWith('http')) return post.image; return '/' + post.image; }
  return 'https://pub-849a283a10a5443389b4f17848459996.r2.dev/tgc/' + (post.slug || post.id) + '.jpg';
}
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function cardHTML(post) {
  var tags = (post.tags || '').split(',').map(function(t) { return t.trim(); }).filter(Boolean);
  return (
    '<article class="card">' +
      '<a href="/post.html?id=' + (post.slug || post.id) + '" class="card-image">' +
        '<img src="' + getPostImage(post) + '" alt="' + esc(post.title) + '" loading="lazy" onerror="this.parentElement.style.display=\'none\'">' +
        '<span class="card-tag">' + esc(REGION) + '</span>' +
      '</a>' +
      '<div class="card-body">' +
        (tags.length ? '<div class="card-kicker">' + esc(tags[0]) + '</div>' : '') +
        '<h3 class="card-title"><a href="/post.html?id=' + (post.slug || post.id) + '">' + esc(post.title) + '</a></h3>' +
        '<p class="card-excerpt">' + esc((post.excerpt || '').substring(0, 120)) + '…</p>' +
        '<div class="card-meta">' + (post.date || '') + ' · ' + (post.readTime || '?') + ' min read</div>' +
      '</div>' +
    '</article>'
  );
}

var allPosts = [];
var searchQuery = '';

function doSearch() {
  searchQuery = document.getElementById('search').value.trim();
  render();
}

function render() {
  var q = searchQuery.toLowerCase();
  var posts = allPosts.filter(function(p) {
    var match = p.region === REGION;
    if (q) match = match && (
      (p.title || '').toLowerCase().indexOf(q) !== -1 ||
      (p.tags || '').toLowerCase().indexOf(q) !== -1 ||
      (p.excerpt || '').toLowerCase().indexOf(q) !== -1
    );
    return match;
  });

  var grid = document.getElementById('post-grid');
  var empty = document.getElementById('no-results');
  var loading = document.getElementById('loading');

  loading.style.display = 'none';

  if (!posts.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    empty.textContent = q ? 'No ' + REGION + ' articles match your search.' : 'No ' + REGION + ' articles yet.';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = posts.map(cardHTML).join('');
}

fetch('/posts.json')
  .then(function(r) { return r.json(); })
  .then(function(posts) {
    allPosts = posts.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
    render();
  })
  .catch(function() {
    document.getElementById('loading').textContent = 'Unable to load articles. Please try again.';
  });
</script>
</body>
</html>
