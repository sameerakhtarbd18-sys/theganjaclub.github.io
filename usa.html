<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Cannabis News & Policy — The Ganja Club</title>
<meta name="description" content="US medical cannabis news, federal reform, state-level changes, and industry developments from The Ganja Club.">
<link rel="alternate" type="application/rss+xml" href="/rss.xml" title="The Ganja Club">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--card:#f9fafb;--card-hover:#f3f4f6;--text:#111827;--dim:#6b7280;--green:#059669;--green-dark:#047857;--line:#e5e7eb;--sans:'Inter',sans-serif;--shadow:0 1px 3px rgba(0,0,0,.04)}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--card-hover:#273449;--text:#f1f5f9;--dim:#94a3b8;--line:#334155;--shadow:0 1px 3px rgba(0,0,0,.2)}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;transition:background .2s,color .2s}
.wrap{max-width:720px;margin:0 auto;padding:0 20px}
a{text-decoration:none;color:inherit}
a:hover{color:var(--green)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:2px solid var(--text);margin-bottom:20px;flex-wrap:wrap;gap:8px}
.logo{font-size:1.4rem;font-weight:700;letter-spacing:-.03em}
.logo span{color:var(--green)}
.nav-links{display:flex;gap:2px;flex-wrap:wrap}
.nav-links a{padding:6px 12px;font-size:.78rem;color:var(--dim);border-radius:4px;transition:all .15s;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--card)}
.nav-links a.active{font-weight:600}
.nav-actions{display:flex;gap:6px;align-items:center}
#theme-toggle{background:none;border:1px solid var(--line);color:var(--dim);cursor:pointer;font-size:1rem;padding:6px 10px;border-radius:4px}
#theme-toggle:hover{color:var(--text)}
.search-wrap{position:relative;margin-bottom:20px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--line);border-radius:6px;font-size:.85rem;background:var(--card);color:var(--text);font-family:var(--sans)}
.search-wrap input:focus{outline:none;border-color:var(--green)}
.search-wrap .s-icon{position:absolute;left:12px;top:11px;color:var(--dim);font-size:.85rem}
#no-results{display:none;text-align:center;padding:40px 0;color:var(--dim)}
.page-title{margin-bottom:8px}
.page-title h1{font-size:1.8rem}
.page-title p{font-size:.85rem;color:var(--dim)}
.card{display:flex;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:6px;margin-bottom:8px;transition:background .15s;cursor:pointer}
.card:hover{background:var(--card-hover)}
.card-img{width:80px;height:80px;flex-shrink:0;border-radius:4px;overflow:hidden;background:var(--line)}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{flex:1;min-width:0}
.card-body h3{font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.card-body .cex{font-size:.78rem;color:var(--dim);line-height:1.45;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-body .cmeta{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.card-body .ctags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.card-body .ctags span{font-size:.62rem;padding:1px 6px;border-radius:3px;background:var(--line);color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
#load-more{display:block;width:100%;padding:14px;margin:20px 0 40px;border:1px solid var(--line);border-radius:6px;background:var(--card);color:var(--dim);font-family:var(--sans);font-size:.85rem;cursor:pointer}
#load-more:hover{color:var(--text);border-color:var(--green)}
.nl{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:28px 24px;margin:32px 0;text-align:center}
.nl h3{font-size:1.1rem;margin-bottom:6px}
.nl p{font-size:.82rem;color:var(--dim);margin-bottom:16px}
.nl-form{display:flex;gap:8px;max-width:400px;margin:0 auto}
.nl-form input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:4px;font-size:.85rem;background:var(--bg);color:var(--text);font-family:var(--sans)}
.nl-form input:focus{outline:none;border-color:var(--green)}
.nl-form button{padding:10px 20px;background:var(--green);color:#fff;border:none;border-radius:4px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--sans)}
.nl-form button:hover{background:var(--green-dark)}
.ft{padding:24px 0;border-top:2px solid var(--line);text-align:center;font-size:.72rem;color:var(--dim)}
.ft a{color:var(--dim);margin:0 8px}
.ft a:hover{color:var(--green)}
@media(max-width:600px){.nav{flex-direction:column;align-items:flex-start;gap:10px}.nav-links{width:100%}.card{flex-direction:column}.card-img{width:100%;height:140px}.nl-form{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
<nav class="nav">
  <a href="/" class="logo">The Ganja <span>Club</span></a>
  <div class="nav-links">
    <a href="/">Latest</a>
    <a href="/uk.html">UK</a>
    <a href="/europe.html">Europe</a>
    <a href="/usa.html" class="active">USA</a>
    <a href="/global.html">Global</a>
  </div>
  <div class="nav-actions">
    <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<div class="search-wrap">
  <span class="s-icon">🔍</span>
  <input type="text" id="search" placeholder="Search USA articles..." oninput="doSearch()">
</div>

<div class="page-title">
  <h1>USA</h1>
  <p>US medical cannabis news, federal reform, state-level changes, and industry developments.</p>
</div>

<div id="no-results">No articles match your search.</div>
<div id="post-list"></div>
<button id="load-more" onclick="loadMore()">Load more articles</button>

<div class="nl">
  <h3>Get the daily briefing</h3>
  <p>UK medical cannabis intelligence, straight to your inbox.</p>
  <div class="nl-form">
    <input type="email" id="nl-email" placeholder="your@email.com">
    <button onclick="subscribe()">Subscribe</button>
  </div>
</div>

<div class="ft">
  <a href="/rss.xml">RSS</a>
  <a href="https://instagram.com/theganjaclub_" target="_blank">Instagram</a>
  <br>© 2026 The Ganja Club
</div>
</div>

<script>
const REGION = 'USA';
let allPosts = [];
let currentPage = 0;
let searchQuery = '';
const PER_PAGE = 10;

fetch('/posts.json').then(r=>r.json()).then(p=>{
  allPosts = p.filter(x => x.region === REGION);
  render();
});

function toggleTheme(){
  const h=document.documentElement;
  const d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('theme-toggle').textContent=d?'🌙':'☀️';
  localStorage.setItem('theme',d?'light':'dark');
}
(function(){
  const s=localStorage.getItem('theme');
  if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme:dark)').matches)){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-toggle').textContent='☀️';
  }
})();

function getFiltered(){
  if(!searchQuery)return allPosts;
  const q=searchQuery.toLowerCase();
  return allPosts.filter(p=>p.title.toLowerCase().includes(q)||(p.tags||'').toLowerCase().includes(q)||(p.excerpt||'').toLowerCase().includes(q));
}

function doSearch(){
  searchQuery=document.getElementById('search').value.trim();
  currentPage=0;
  const f=getFiltered();
  document.getElementById('no-results').style.display=f.length?'none':'block';
  render(f);
}

function render(posts){
  const p=posts||getFiltered();
  const v=p.slice(0,(currentPage+1)*PER_PAGE);
  document.getElementById('post-list').innerHTML=v.map(post=>{
    const tags=(post.tags||'').split(',').map(t=>t.trim()).filter(Boolean).slice(0,3);
    const img=post.image||`https://pub-849a283a10a5443389b4f17848459996.r2.dev/tgc/${post.slug||post.id}.jpg`;
    return `<a href="/post.html?id=${post.slug||post.id}" class="card">
      <div class="card-img"><img src="${img}" alt="${esc(post.title)}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>
      <div class="card-body">
        <h3>${esc(post.title)}</h3>
        <div class="cex">${esc(post.excerpt||'')}</div>
        <div class="cmeta">${post.date} · ${post.readTime||'?'} min read</div>
        <div class="ctags">${tags.map(t=>`<span>${t}</span>`).join('')}</div>
      </div></a>`;
  }).join('');
  document.getElementById('load-more').style.display=v.length<allPosts.length?'block':'none';
}

function loadMore(){currentPage++;render();}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function subscribe(){
  const e=document.getElementById('nl-email').value.trim();
  if(!e||!e.includes('@')){alert('Please enter a valid email.');return;}
  alert('Thanks! Coming soon.');
  document.getElementById('nl-email').value='';
}
</script>
</body>
</html>
