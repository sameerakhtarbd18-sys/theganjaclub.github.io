[build]
  base = "astro-site"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/uk.html"
  to = "/uk"
  status = 301

[[redirects]]
  from = "/europe.html"
  to = "/europe"
  status = 301

[[redirects]]
  from = "/usa.html"
  to = "/usa"
  status = 301

[[redirects]]
  from = "/global.html"
  to = "/global"
  status = 301

[[redirects]]
  from = "/post.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/grow-assistant.html"
  to = "/grow-assistant"
  status = 301

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[functions]
  directory = "astro-site/netlify/functions"

[[redirects]]
  from = "/grow-assistant"
  to = "/guides"
  status = 301

[[redirects]]
  from = "/grow-assistant.html"
  to = "/guides"
  status = 301
