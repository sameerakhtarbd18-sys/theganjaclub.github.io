name: gitleaks
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the scan covers every commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is NOT needed: free for public repos + personal accounts.
          # Only required if this repo is ever moved under a GitHub organisation.
